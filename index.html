<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚽ 鱼宝足球站</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0e17;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .container { text-align: center; padding: 40px 20px; }
    .logo { font-size: 64px; margin-bottom: 16px; }
    h1 {
      font-size: 2.2rem;
      background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
    .subtitle { color: #888; font-size: 1rem; margin-bottom: 48px; }
    .cards { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 36px 32px;
      width: 320px;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-4px);
    }
    .card-icon { font-size: 48px; margin-bottom: 16px; }
    .card h2 { font-size: 1.3rem; margin-bottom: 8px; color: #fff; }
    .card p { font-size: 0.9rem; color: #999; line-height: 1.5; }
    .footer { margin-top: 60px; color: #555; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">⚽</div>
    <h1>鱼宝足球站</h1>
    <p class="subtitle">由鱼宝2.0为你打造</p>
    <div class="cards">
      <a class="card" href="dashboard.html">
        <div class="card-icon">📊</div>
        <h2>赛事预测</h2>
        <p>每日足球赛事量化分析、EV计算、凯利值、冷门评分，数据驱动决策</p>
      </a>
      <a class="card" href="clubs.html">
        <div class="card-icon">🏟️</div>
        <h2>俱乐部图鉴</h2>
        <p>欧洲五大联赛俱乐部深度介绍，历史、阵容、传奇球星一网打尽</p>
      </a>
    </div>
    <div class="footer">Powered by 鱼宝2.0 · Data from 中国体彩官网</div>
  </div>
</body>
</html>
