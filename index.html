<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ FOOTCAST - 足球预测面板</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060a12;--bg2:#111827;--bg3:#1e293b;--bg4:#263348;
  --green:#00e676;--green-dim:rgba(0,230,118,.18);--green-glow:0 0 24px rgba(0,230,118,.3);
  --amber:#ffab00;--amber-dim:rgba(255,171,0,.18);--amber-glow:0 0 24px rgba(255,171,0,.3);
  --red:#ff1744;--red-dim:rgba(255,23,68,.18);--red-glow:0 0 24px rgba(255,23,68,.3);
  --cyan:#00e5ff;--cyan-dim:rgba(0,229,255,.18);
  --blue:#448aff;--blue-dim:rgba(68,138,255,.18);
  --purple:#b388ff;--purple-dim:rgba(179,136,255,.18);
  --text:#f0f2f5;--text2:#a0aec0;--text3:#64748b;
  --border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.18);
  --radius:14px;--radius-sm:10px;
  --font-display:'Oswald',sans-serif;
  --font-body:'Noto Sans SC',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-body);background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:.4;
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);
  background-size:80px 80px;
}
.container{max-width:1440px;margin:0 auto;padding:24px;position:relative;z-index:1}

/* Header */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 0 28px;border-bottom:2px solid var(--border2);
  margin-bottom:28px;flex-wrap:wrap;gap:16px;
}
.header-left{display:flex;align-items:center;gap:14px}
.logo{
  font-family:var(--font-display);font-size:32px;font-weight:700;
  letter-spacing:3px;color:var(--green);text-shadow:var(--green-glow);
  display:flex;align-items:center;gap:10px;user-select:none;
}
.logo .live-dot{
  width:8px;height:8px;background:var(--green);border-radius:50%;
  animation:livePulse 2s infinite;box-shadow:var(--green-glow);
}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.header-sub{font-size:12px;color:var(--text2);letter-spacing:2px;font-weight:400;text-transform:uppercase}
.date-nav{display:flex;align-items:center;gap:6px}
.date-nav button{
  background:var(--bg3);border:1px solid var(--border2);color:var(--text2);
  width:36px;height:36px;border-radius:var(--radius-sm);cursor:pointer;
  font-size:14px;transition:all .25s;display:flex;align-items:center;justify-content:center;
}
.date-nav button:hover{border-color:var(--green);color:var(--green);background:var(--green-dim)}
.date-nav button:disabled{opacity:.3;cursor:default;border-color:var(--border)}
.current-date{
  background:var(--green-dim);border:1px solid rgba(0,230,118,.35);color:var(--green);
  font-family:var(--font-mono);font-size:13px;font-weight:600;
  padding:8px 20px;border-radius:var(--radius-sm);letter-spacing:1.5px;
  min-width:140px;text-align:center;
}

/* Stats */
.stats-bar{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:10px;margin-bottom:28px;
}
.stat-card{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--radius-sm);padding:16px 18px;
  position:relative;overflow:hidden;
}
.stat-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--green),transparent);opacity:.8;
}
.stat-card .label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:2.5px;margin-bottom:6px;font-weight:500}
.stat-card .value{font-family:var(--font-display);font-size:30px;font-weight:600;line-height:1}
.stat-card .value.green{color:var(--green)}
.stat-card .value.amber{color:var(--amber)}
.stat-card .value.red{color:var(--red)}
.stat-card .value.cyan{color:var(--cyan)}

/* Toolbar */
.toolbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;flex-wrap:wrap;gap:8px;
}
.toolbar-left{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:14px}
.filter-bar{display:inline-flex;gap:2px;background:var(--bg2);border-radius:var(--radius-sm);padding:3px;border:1px solid var(--border2)}
.filter-btn{
  padding:5px 14px;border:none;background:transparent;
  color:var(--text2);font-family:var(--font-body);font-size:12px;
  cursor:pointer;border-radius:6px;transition:all .2s;white-space:nowrap;
}
.filter-btn.active{background:var(--bg3);color:var(--text);box-shadow:0 2px 10px rgba(0,0,0,.4);font-weight:600}
.filter-btn:hover:not(.active){color:var(--text)}
.toolbar-right{display:flex;gap:6px}
.toolbar-right button{
  background:var(--bg3);border:1px solid var(--border2);color:var(--text2);
  padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;
  font-family:var(--font-body);font-size:12px;transition:all .2s;
}
.toolbar-right button:hover{border-color:var(--green);color:var(--green)}

/* Match Cards */
.match-grid{display:flex;flex-direction:column;gap:16px}
.match-card{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--radius);overflow:hidden;
  transition:all .35s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.match-card:hover{border-color:rgba(255,255,255,.28)}
.match-card.discarded{opacity:.55;pointer-events:none}
.match-card.discarded::after{
  content:'弃盘';position:absolute;top:18px;right:18px;
  background:var(--red);color:#fff;font-size:12px;font-weight:700;
  padding:5px 14px;border-radius:20px;letter-spacing:1px;
  font-family:var(--font-display);z-index:5;
}
.match-card.risk-warn{border-left:3px solid var(--amber)}
.match-card.risk-danger{border-left:3px solid var(--red)}
.match-card.reviewed{border-left:3px solid var(--green)}
.match-card.reviewed-allcorrect{border-left:4px solid var(--green);box-shadow:0 0 20px rgba(0,230,118,.08),inset 0 0 40px rgba(0,230,118,.04)}
.match-card.reviewed-anywrong{border-left:4px solid var(--red);box-shadow:0 0 20px rgba(255,23,68,.08),inset 0 0 40px rgba(255,23,68,.04)}

/* Header */
.match-header{
  padding:20px 24px;display:grid;
  grid-template-columns:56px 1fr auto;
  gap:16px;align-items:center;cursor:pointer;
  transition:background .2s;user-select:none;
}
.match-header:hover{background:rgba(255,255,255,.03)}
.match-seq{
  font-family:var(--font-display);font-size:46px;font-weight:700;
  color:rgba(255,255,255,.08);line-height:1;text-align:center;
}
.match-info{display:flex;flex-direction:column;gap:5px;min-width:0}
.match-league{
  font-size:11px;color:var(--green);text-transform:uppercase;
  letter-spacing:2px;font-weight:500;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.tag{background:var(--green-dim);padding:2px 8px;border-radius:4px;font-size:10px;border:1px solid rgba(0,230,118,.25);color:var(--green)}
.tag.handicap-tag{background:var(--cyan-dim);color:var(--cyan);border-color:rgba(0,229,255,.25)}
.tag.result-correct{background:var(--green-dim);color:var(--green);border-color:rgba(0,230,118,.35);font-weight:600}
.tag.result-wrong{background:var(--red-dim);color:var(--red);border-color:rgba(255,23,68,.35);font-weight:600}
.tag.result-partial{background:var(--amber-dim);color:var(--amber);border-color:rgba(255,171,0,.35);font-weight:600}
.match-teams{
  font-family:var(--font-display);font-size:26px;font-weight:600;
  letter-spacing:1px;display:flex;align-items:center;gap:14px;
}
.match-teams .vs{color:var(--text3);font-size:15px;font-weight:300;padding:2px 0}
.match-time-row{
  font-family:var(--font-mono);font-size:12px;color:var(--text3);
  display:flex;align-items:center;gap:10px;
}
.match-time-row .result-score{color:var(--green);font-weight:600}
.match-meta{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.match-decision-badge{
  font-family:var(--font-display);font-size:15px;font-weight:600;
  padding:7px 16px;border-radius:var(--radius-sm);letter-spacing:.5px;white-space:nowrap;
}
.match-decision-badge.win{background:var(--green-dim);color:var(--green);border:1px solid rgba(0,230,118,.35)}
.match-decision-badge.draw{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(255,171,0,.35)}
.match-decision-badge.lose{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,23,68,.35)}
.match-score-line{font-family:var(--font-mono);font-size:12px;color:var(--text3)}
.match-score-line .pred{color:var(--amber);font-weight:600}
.match-score-line .actual{color:var(--green);font-weight:600;font-size:14px}

.expand-hint{
  font-size:11px;color:var(--text3);text-align:center;
  padding:2px 0 6px;transition:all .3s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.expand-hint .arrow{
  display:inline-block;transition:transform .35s;font-size:10px;
  border:1px solid var(--border2);border-radius:50%;
  width:20px;height:20px;line-height:20px;
}
.match-card.expanded .expand-hint .arrow{transform:rotate(180deg)}
.match-card.expanded .expand-hint{color:var(--green)}

.match-details{
  max-height:0;overflow:hidden;
  transition:max-height .6s cubic-bezier(.4,0,.2,1);
}
.match-card.expanded .match-details{max-height:6000px}
.details-inner{padding:0 24px 28px}

/* Decision box */
.decision-box{
  background:linear-gradient(135deg,var(--bg3),var(--bg2));
  border:1px solid var(--border2);border-radius:var(--radius);
  padding:22px 24px;margin-bottom:20px;
  display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}
@media(max-width:700px){.decision-box{grid-template-columns:1fr}}
.decision-main .label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:2.5px;margin-bottom:8px;font-weight:600}
.decision-main .choice{font-family:var(--font-display);font-size:22px;font-weight:600;color:var(--green);letter-spacing:.5px}
.decision-score-box{text-align:center;padding:14px 28px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border2)}
.decision-score-box .label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:2.5px;margin-bottom:6px;font-weight:600}
.decision-score-box .scores{font-family:var(--font-mono);font-size:20px;font-weight:600;color:var(--amber);letter-spacing:3px}

/* ===== Review Section (NEW) ===== */
.review-section{
  background:linear-gradient(135deg,rgba(0,230,118,.08),rgba(0,229,255,.06));
  border:1px solid rgba(0,230,118,.3);border-radius:var(--radius);
  padding:20px 24px;margin-bottom:20px;
  box-shadow:0 0 30px rgba(0,230,118,.06);
}
.review-title{
  font-family:var(--font-display);font-size:16px;font-weight:600;
  color:var(--green);letter-spacing:1px;margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
.review-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:700px){.review-grid{grid-template-columns:repeat(2,1fr)}}
.review-item{
  background:var(--bg);border:1px solid var(--border2);
  border-radius:var(--radius-sm);padding:14px 16px;text-align:center;
}
.review-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;font-weight:600}
.review-value{font-family:var(--font-mono);font-size:16px;font-weight:600;color:var(--text)}
.review-value.score-value{color:var(--cyan);font-size:20px;letter-spacing:2px}
.review-value.correct{color:var(--green)}
.review-value.wrong{color:var(--red)}
.review-value.neutral{color:var(--text3)}
.review-attribution{margin-top:14px;padding-top:14px;border-top:1px solid var(--border2);display:flex;gap:10px;flex-wrap:wrap}
.attr-label{font-size:11px;color:var(--amber);font-weight:600;text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap;padding-top:2px}
.attr-text{font-size:13px;color:var(--text);line-height:1.7}

/* Risk card */
.risk-section{margin-bottom:20px}
.risk-card{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:18px 20px}
.risk-top{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.risk-gauge{
  width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:22px;font-weight:700;border:3px solid;
}
.risk-gauge.safe{border-color:var(--green);color:var(--green);background:var(--green-dim)}
.risk-gauge.caution{border-color:var(--amber);color:var(--amber);background:var(--amber-dim)}
.risk-gauge.danger{border-color:var(--red);color:var(--red);background:var(--red-dim)}
.risk-info .risk-level{font-size:14px;font-weight:600;margin-bottom:2px}
.risk-info .risk-level.safe{color:var(--green)}
.risk-info .risk-level.caution{color:var(--amber)}
.risk-info .risk-level.danger{color:var(--red)}
.risk-info .risk-desc{font-size:12px;color:var(--text2)}
.risk-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.risk-tag{padding:3px 10px;border-radius:4px;font-size:11px;font-weight:500;letter-spacing:.3px}
.risk-tag.green{background:var(--green-dim);color:var(--green)}
.risk-tag.amber{background:var(--amber-dim);color:var(--amber)}
.risk-tag.red{background:var(--red-dim);color:var(--red)}
.risk-tag.blue{background:var(--blue-dim);color:var(--blue)}
.risk-tag.cyan{background:var(--cyan-dim);color:var(--cyan)}
.risk-detail-line{margin-top:10px;font-family:var(--font-mono);font-size:11px;color:var(--text2);line-height:1.6}

/* Probability bars */
.prob-section{margin-bottom:20px}
.prob-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.prob-grid{grid-template-columns:1fr}}
.prob-card{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:18px 20px}
.prob-card-title{font-size:12px;color:var(--text);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.prob-card-title .badge{background:var(--cyan-dim);color:var(--cyan);padding:2px 8px;border-radius:4px;font-size:10px;border:1px solid rgba(0,229,255,.25)}
.prob-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.prob-row:last-child{margin-bottom:0}
.prob-label{width:32px;font-family:var(--font-display);font-size:14px;font-weight:500;color:var(--text2)}
.prob-bar-track{flex:1;height:26px;background:var(--bg4);border-radius:6px;position:relative;overflow:hidden}
.prob-bar{height:100%;border-radius:6px;transition:width 1.2s cubic-bezier(.4,0,.2,1);position:relative;display:flex;align-items:center;justify-content:flex-end;padding-right:8px}
.prob-bar.win-bar{background:linear-gradient(90deg,rgba(0,230,118,.25),rgba(0,230,118,.65))}
.prob-bar.draw-bar{background:linear-gradient(90deg,rgba(255,171,0,.25),rgba(255,171,0,.65))}
.prob-bar.lose-bar{background:linear-gradient(90deg,rgba(255,23,68,.25),rgba(255,23,68,.65))}
.prob-bar .odds-text{font-family:var(--font-mono);font-size:11px;font-weight:600;color:rgba(255,255,255,.9);text-shadow:0 1px 4px rgba(0,0,0,.6);white-space:nowrap}
.prob-pct{width:48px;text-align:right;font-family:var(--font-mono);font-size:14px;font-weight:600}
.prob-pct.green{color:var(--green)}
.prob-pct.amber{color:var(--amber)}
.prob-pct.red{color:var(--red)}

/* Data table */
.data-table-wrap{overflow-x:auto;margin-bottom:20px;border:1px solid var(--border2);border-radius:var(--radius-sm)}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table thead th{padding:10px 14px;text-align:center;font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;background:var(--bg3);border-bottom:1px solid var(--border2)}
.data-table thead th.left{text-align:left}
.data-table tbody td{padding:10px 14px;text-align:center;font-family:var(--font-mono);font-size:12px;border-bottom:1px solid var(--border)}
.data-table tbody td.left{text-align:left;font-family:var(--font-display);font-weight:500;color:var(--text)}
.data-table tbody tr:hover{background:rgba(255,255,255,.04)}
.data-table .ev-pos{color:var(--green);font-weight:700}
.data-table .ev-neg{color:var(--text3)}
.data-table .ev-zero{color:var(--amber);font-weight:600}
.data-table .kelly-pos{color:var(--green);font-weight:600;background:var(--green-dim);padding:2px 6px;border-radius:4px}
.data-table .kelly-neg{color:var(--text3)}
.data-table .best{background:var(--green-dim);color:var(--green);padding:2px 8px;border-radius:4px;font-weight:600}
.data-table .best-k{background:var(--purple-dim);color:var(--purple);padding:2px 8px;border-radius:4px;font-weight:600}

/* Analysis cards */
.analysis-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
@media(max-width:700px){.analysis-grid{grid-template-columns:1fr}}
.analysis-item{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;transition:border-color .2s;cursor:pointer}
.analysis-item:hover{border-color:rgba(255,255,255,.28)}
.analysis-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;transition:background .2s}
.analysis-header:hover{background:rgba(255,255,255,.04)}
.analysis-header .title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.analysis-header .icon{font-size:15px}
.analysis-header .chevron{color:var(--text2);transition:transform .3s;font-size:10px;border:1px solid var(--border2);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center}
.analysis-item.open .chevron{transform:rotate(90deg);color:var(--green);border-color:var(--green)}
.analysis-body{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1)}
.analysis-item.open .analysis-body{max-height:600px}
.analysis-content{padding:0 16px 16px;font-size:13px;line-height:1.9;color:var(--text);border-top:1px solid var(--border2);padding-top:12px}
.hl-green{color:var(--green);font-weight:600}
.hl-amber{color:var(--amber);font-weight:600}
.hl-red{color:var(--red);font-weight:600}

/* Post-match pending */
.post-match{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:16px 20px}
.post-match .label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:2.5px;margin-bottom:8px;font-weight:600}
.result-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.pm-tag{padding:5px 14px;border-radius:6px;font-size:13px;font-weight:600;font-family:var(--font-mono)}
.pm-tag.pending{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}

/* Footer */
.footer{text-align:center;padding:28px 0 12px;font-size:11px;color:var(--text2);border-top:1px solid var(--border2);margin-top:36px;letter-spacing:.5px}

/* Empty */
.empty-state{text-align:center;padding:80px 20px;color:var(--text3)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state .msg{font-size:15px}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* Animations */
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.match-card{animation:slideUp .5s cubic-bezier(.4,0,.2,1) both}
.match-card:nth-child(1){animation-delay:.05s}
.match-card:nth-child(2){animation-delay:.12s}
.match-card:nth-child(3){animation-delay:.19s}
.match-card:nth-child(4){animation-delay:.26s}
.match-card:nth-child(5){animation-delay:.33s}
.match-card:nth-child(6){animation-delay:.40s}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <div class="logo"><div class="live-dot"></div>FOOTCAST</div>
      <div class="header-sub">Prediction Dashboard</div>
    </div>
    <div class="date-nav">
      <button id="prevBtn" onclick="navDate(-1)">◀</button>
      <div class="current-date" id="currentDate"></div>
      <button id="nextBtn" onclick="navDate(1)">▶</button>
    </div>
  </div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="toolbar">
    <div class="toolbar-left">
      <span id="matchCount"></span>
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
        <button class="filter-btn" data-filter="pending" onclick="setFilter('pending')">⏳待赛</button>
        <button class="filter-btn" data-filter="done" onclick="setFilter('done')">✅已完赛</button>
      </div>
    </div>
    <div class="toolbar-right">
      <button onclick="expandAll()">展开全部</button>
      <button onclick="collapseAll()">收起全部</button>
    </div>
  </div>
  <div class="match-grid" id="matchGrid"></div>
  <div class="footer">
    ⚠️ AI生成内容仅供参考，不构成投注建议 · 赔率数据来源：中国体彩官网 · 冷门压力测试 v4.2
  </div>
</div>

<script>
// ===== DATA (loaded dynamically) =====
let ALL_DATA = {};
let _dataUrl = ''; // will be set by loader

function loadDataAndRender(dataUrl) {
  _dataUrl = dataUrl;
  const script = document.createElement('script');
  script.onload = function() {
    if (window.FOOTCAST_DATA) {
      ALL_DATA = window.FOOTCAST_DATA;
      dateKeys = Object.keys(ALL_DATA).sort();
      // default to latest date
      currentDateKey = dateKeys[dateKeys.length - 1];
      render();
    }
  };
  script.onerror = function() {
    document.getElementById('matchGrid').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div class="msg">数据加载失败，请刷新重试</div></div>';
  };
  script.src = dataUrl;
  document.head.appendChild(script);
}

// ===== STATE =====
let currentDateKey = "20260614";
let currentFilter = "all"; // "all" | "pending" | "done"
let dateKeys = [];

// ===== UTILS =====
const f = (v, d=4) => (v==null) ? '—' : Number(v).toFixed(d);
const fpct = v => (v==null) ? '—' : Math.round(v) + '%';
const fodds = v => (v==null) ? '—' : Number(v).toFixed(2);
function evCls(v) { if(v==null) return ''; return v>0.01?'ev-pos':v>-0.01?'ev-zero':'ev-neg'; }
function kellyCls(v) { if(v==null) return ''; return v>0?'kelly-pos':'kelly-neg'; }
function parseRisk(s) { const m=s.match(/冷门压力测试v4\.2:(-?\d+)分/); return m?parseInt(m[1]):0; }
function riskLvl(s) { return s>=9?'danger':s>=6?'caution':'safe'; }
function decCls(d) { if(d.includes('弃盘')) return 'lose'; if(d.includes('平局')||d.includes('让平')) return 'draw'; return 'win'; }
function hasResult(m) { return !!(m.actual_score || m.correct); }
function parseCorrect(c) {
  if(!c) return {normal:null, handicap:null};
  const p = c.split('/');
  if(p.length===2) return {normal:p[0].trim()==='-'?null:p[0].trim(), handicap:p[1].trim()==='-'?null:p[1].trim()};
  if(p.length===1) return {normal:p[0].trim()==='-'?null:p[0].trim(), handicap:null};
  return {normal:null, handicap:null};
}
function hlText(t) {
  return t
    .replace(/⚠️/g,'<span class="hl-amber">⚠️</span>')
    .replace(/🚨/g,'<span class="hl-red">🚨</span>')
    .replace(/⭐/g,'<span class="hl-amber">⭐</span>')
    .replace(/★★★/g,'<span class="hl-red">★★★</span>')
    .replace(/★★/g,'<span class="hl-amber">★★</span>');
}

// ===== FILTER =====
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  render();
}

// ===== RENDER =====
function render() {
  const data = ALL_DATA[currentDateKey];
  const dIdx = dateKeys.indexOf(currentDateKey);
  document.getElementById('prevBtn').disabled = dIdx <= 0;
  document.getElementById('nextBtn').disabled = dIdx >= dateKeys.length - 1;

  if (!data) {
    document.getElementById('matchGrid').innerHTML = '<div class="empty-state"><div class="icon">📭</div><div class="msg">当日暂无预测数据</div></div>';
    document.getElementById('currentDate').textContent = '—';
    return;
  }
  document.getElementById('currentDate').textContent = data.date;
  renderStats(data);
  renderMatches(data);
}

function renderStats(data) {
  const ms = data.matches;
  const total = ms.length;
  const discarded = ms.filter(m=>m.decision.includes('弃盘')).length;
  const normal = total - discarded;
  const reviewed = ms.filter(m=>hasResult(m)).length;
  const correctCount = ms.reduce((cnt,m)=>{
    if(!m.correct) return cnt;
    const c = parseCorrect(m.correct);
    if(c.normal==='对') cnt++;
    if(c.handicap==='对') cnt++;
    return cnt;
  }, 0);
  const totalCount = ms.reduce((cnt,m)=>{
    if(!m.correct) return cnt;
    const c = parseCorrect(m.correct);
    if(c.normal!=null) cnt++;
    if(c.handicap!=null) cnt++;
    return cnt;
  }, 0);
  let posEvMatches = 0;
  ms.forEach(m => {
    let hasPos = false;
    ['normal','handicap'].forEach(k => {
      const d = m[k];
      if(d.ev_win!=null && (d.ev_win>0||d.ev_draw>0||d.ev_lose>0)) hasPos = true;
    });
    if(hasPos) posEvMatches++;
  });
  const avgRisk = ms.reduce((s,m)=>s+Math.abs(parseRisk(m.risk_signal)),0)/total;
  const accuracyPct = totalCount>0 ? Math.round((correctCount/totalCount)*100) : null;

  let html = `
    <div class="stat-card"><div class="label">预测场次</div><div class="value green">${total}</div></div>
    <div class="stat-card"><div class="label">正常盘</div><div class="value cyan">${normal}</div></div>
    <div class="stat-card"><div class="label">弃盘</div><div class="value ${discarded?'red':''}">${discarded}</div></div>
    <div class="stat-card"><div class="label">正EV场次</div><div class="value amber">${posEvMatches}</div></div>
    <div class="stat-card"><div class="label">平均冷门分</div><div class="value">${avgRisk.toFixed(1)}</div></div>`;
  if(totalCount>0) {
    html += `<div class="stat-card"><div class="label">已复盘 / 命中率</div><div class="value ${accuracyPct>=50?'green':'red'}">${correctCount}/${totalCount} = ${accuracyPct}%</div></div>`;
  }
  document.getElementById('statsBar').innerHTML = html;
}

function renderMatches(data) {
  let ms = data.matches;
  if(currentFilter==='pending') ms = ms.filter(m=>!hasResult(m));
  else if(currentFilter==='done') ms = ms.filter(m=>hasResult(m));

  document.getElementById('matchCount').textContent = `共 ${ms.length} / ${data.matches.length} 场`;

  if(ms.length===0) {
    const msg = currentFilter==='done'?'暂无已完赛场次':currentFilter==='pending'?'暂无待赛场次':'当日暂无预测数据';
    document.getElementById('matchGrid').innerHTML = `<div class="empty-state"><div class="icon">📭</div><div class="msg">${msg}</div></div>`;
    return;
  }

  const grid = document.getElementById('matchGrid');
  grid.innerHTML = ms.map((m,i)=>renderCard(m,i)).join('');
  setTimeout(()=>{
    document.querySelectorAll('.prob-bar[data-w]').forEach(b=>{b.style.width=b.dataset.w;});
  },80);
}

function renderCard(m, idx) {
  const rs = parseRisk(m.risk_signal);
  const rl = riskLvl(rs);
  const dc = decCls(m.decision);
  const isDisc = m.decision.includes('弃盘');
  const isReviewed = hasResult(m);
  const hasN = m.normal.type && !m.normal.type.includes('未开售') && m.normal.win_pct!=null;
  const hasH = m.handicap.type && m.handicap.win_pct!=null;
  const correctInfo = parseCorrect(m.correct);

  // Determine review class for card border
  let reviewCls = '';
  if(isReviewed) {
    const nOk = correctInfo.normal==='对', nErr = correctInfo.normal==='错';
    const hOk = correctInfo.handicap==='对', hErr = correctInfo.handicap==='错';
    const nHas = correctInfo.normal!=null, hHas = correctInfo.handicap!=null;
    const allCorrect = (nHas?nOk:true) && (hHas?hOk:true);
    const anyWrong = (nHas&&nErr) || (hHas&&hErr);
    reviewCls = allCorrect ? 'reviewed reviewed-allcorrect' : anyWrong ? 'reviewed reviewed-anywrong' : 'reviewed';
  }

  let cls = 'match-card';
  if(isDisc) cls += ' discarded';
  else if(rl==='danger') cls += ' risk-danger';
  else if(rl==='caution') cls += ' risk-warn';
  cls += reviewCls ? ' ' + reviewCls : '';

  // Result tag for header
  let resultTag = '';
  if(isReviewed) {
    const nOk = correctInfo.normal==='对', nErr = correctInfo.normal==='错';
    const hOk = correctInfo.handicap==='对', hErr = correctInfo.handicap==='错';
    const nHas = correctInfo.normal!=null, hHas = correctInfo.handicap!=null;
    if(nHas && hHas) {
      if(nOk && hOk) resultTag = '<span class="tag result-correct">✅ 全对</span>';
      else if(nErr && hErr) resultTag = '<span class="tag result-wrong">❌ 全错</span>';
      else resultTag = '<span class="tag result-partial">⚡ 部分对</span>';
    } else if(hHas) {
      resultTag = hOk ? '<span class="tag result-correct">✅ 让球盘对</span>' : '<span class="tag result-wrong">❌ 让球盘错</span>';
    } else if(nHas) {
      resultTag = nOk ? '<span class="tag result-correct">✅ 普通盘对</span>' : '<span class="tag result-wrong">❌ 普通盘错</span>';
    }
  }

  // Score line in header
  let scoreLine = '';
  if(isReviewed) {
    scoreLine = `<span class="actual">比分 <span class="actual">${m.actual_score}</span></span>`;
  } else {
    scoreLine = `比分 <span class="pred">${m.score_predict}</span>`;
  }

  return `
  <div class="${cls}" id="mc-${idx}">
    <div class="match-header" onclick="toggle(${idx})">
      <div class="match-seq">${String(m.seq).padStart(2,'0')}</div>
      <div class="match-info">
        <div class="match-league">
          ${m.league}
          ${m.normal.type&&m.normal.type.includes('未开售')?'<span class="tag">普通盘未开售</span>':''}
          ${m.handicap.type?'<span class="tag handicap-tag">'+m.handicap.type+'</span>':''}
          ${resultTag}
        </div>
        <div class="match-teams"><span>${m.home}</span><span class="vs">VS</span><span>${m.away}</span></div>
        <div class="match-time-row">
          <span>📅 ${m.date} ${m.time}</span>
          ${isReviewed?'<span class="result-score">🏅 实际: '+m.actual_score+'</span>':''}
        </div>
      </div>
      <div class="match-meta">
        <div class="match-decision-badge ${dc}">${m.decision}</div>
        <div class="match-score-line">${scoreLine}</div>
      </div>
    </div>
    <div class="expand-hint"><span class="arrow">▼</span> 点击展开详细分析</div>
    <div class="match-details">
      <div class="details-inner">
        ${renderDecision(m)}
        ${isReviewed ? renderReview(m, correctInfo) : ''}
        ${renderRisk(m, rs, rl)}
        <div class="prob-section">
          <div class="prob-grid">
            ${hasN ? renderProb('普通盘', m.normal) : ''}
            ${hasH ? renderProb(m.handicap.type, m.handicap) : ''}
          </div>
        </div>
        ${(hasN||hasH) ? renderTable(m) : ''}
        <div class="analysis-grid">${renderAnalysis(m)}</div>
        ${!isReviewed ? renderPostMatchPending() : ''}
      </div>
    </div>
  </div>`;
}

function renderDecision(m) {
  return `
  <div class="decision-box">
    <div class="decision-main">
      <div class="label">最终决策</div>
      <div class="choice">${m.decision}</div>
    </div>
    <div class="decision-score-box">
      <div class="label">比分预测</div>
      <div class="scores">${m.score_predict}</div>
    </div>
  </div>`;
}

function renderReview(m, ci) {
  return `
  <div class="review-section">
    <div class="review-title">🏅 赛后复盘</div>
    <div class="review-grid">
      <div class="review-item">
        <div class="review-label">实际比分</div>
        <div class="review-value score-value">${m.actual_score||'—'}</div>
      </div>
      <div class="review-item">
        <div class="review-label">盘口结果</div>
        <div class="review-value">${m.handicap_result||'—'}</div>
      </div>
      <div class="review-item">
        <div class="review-label">普通盘</div>
        <div class="review-value ${ci.normal==='对'?'correct':ci.normal==='错'?'wrong':'neutral'}">
          ${ci.normal==='对'?'✅ 对':ci.normal==='错'?'❌ 错':ci.normal==null?'— 未开售 —':'—'}
        </div>
      </div>
      <div class="review-item">
        <div class="review-label">让球盘</div>
        <div class="review-value ${ci.handicap==='对'?'correct':ci.handicap==='错'?'wrong':'neutral'}">
          ${ci.handicap==='对'?'✅ 对':ci.handicap==='错'?'❌ 错':ci.handicap==null?'— 未开售 —':'—'}
        </div>
      </div>
    </div>
    ${m.attribution ? `<div class="review-attribution"><span class="attr-label">归因分析</span><span class="attr-text">${m.attribution}</span></div>` : ''}
  </div>`;
}

function renderRisk(m, score, level) {
  const parts = m.risk_signal.split(' | ');
  const tags = [];
  parts.forEach(p => {
    const kv = p.split('=');
    if(kv.length===2) {
      const c = kv[1].includes('强')?'green':kv[1].includes('无欲')?'amber':'cyan';
      tags.push({l:kv[0],v:kv[1],c});
    }
  });
  const dm = m.risk_signal.match(/各项得分明细=(.*)/);
  const detail = dm?dm[1]:'';
  const levelText = score>=12?'🚨强制弃盘':score>=9?'🚨强制弃盘':score>=6?'⚠️建议弃盘':score>=3?'⚡冷门警惕':'✅正常';

  return `
  <div class="risk-section">
    <div class="risk-card">
      <div class="risk-top">
        <div class="risk-gauge ${level}">${score}</div>
        <div class="risk-info">
          <div class="risk-level ${level}">${levelText}</div>
          <div class="risk-desc">冷门压力测试 v4.2</div>
        </div>
      </div>
      <div class="risk-tags">${tags.map(t=>`<span class="risk-tag ${t.c}">${t.l}: ${t.v}</span>`).join('')}</div>
      ${detail?`<div class="risk-detail-line">得分明细: ${detail}</div>`:''}
    </div>
  </div>`;
}

function renderProb(title, d) {
  const items = [
    {l:'胜',pct:d.win_pct,cls:'win-bar',odds:d.win_odds,c:'green'},
    {l:'平',pct:d.draw_pct,cls:'draw-bar',odds:d.draw_odds,c:'amber'},
    {l:'负',pct:d.lose_pct,cls:'lose-bar',odds:d.lose_odds,c:'red'},
  ];
  return `
  <div class="prob-card">
    <div class="prob-card-title">${title} <span class="badge">概率分布</span></div>
    ${items.map(it=>`
      <div class="prob-row">
        <div class="prob-label">${it.l}</div>
        <div class="prob-bar-track">
          <div class="prob-bar ${it.cls}" style="width:0" data-w="${it.pct||0}%"><span class="odds-text">${fodds(it.odds)}</span></div>
        </div>
        <div class="prob-pct ${it.c}">${fpct(it.pct)}</div>
      </div>`).join('')}
  </div>`;
}

function renderTable(m) {
  const hasN = m.normal.win_pct!=null && m.normal.type!=='普通盘未开售';
  const hasH = m.handicap.win_pct!=null;
  const rows = [];
  if(hasN) rows.push({label:'普通盘',d:m.normal});
  if(hasH) rows.push({label:m.handicap.type,d:m.handicap});

  return `
  <div class="data-table-wrap">
    <table class="data-table">
      <thead><tr>
        <th class="left">盘口</th><th>胜赔</th><th>平赔</th><th>负赔</th>
        <th>EV胜</th><th>EV平</th><th>EV负</th><th>凯利胜</th><th>凯利平</th><th>凯利负</th>
      </tr></thead>
      <tbody>
        ${rows.map(r=>{
          const evs=[r.d.ev_win,r.d.ev_draw,r.d.ev_lose].map(v=>v==null?-999:v);
          const kls=[r.d.kelly_win,r.d.kelly_draw,r.d.kelly_lose].map(v=>v==null?-999:v);
          const maxEvI=evs.indexOf(Math.max(...evs));
          const maxKlI=kls.indexOf(Math.max(...kls));
          const odds=[r.d.win_odds,r.d.draw_odds,r.d.lose_odds];
          const evVals=[r.d.ev_win,r.d.ev_draw,r.d.ev_lose];
          const klVals=[r.d.kelly_win,r.d.kelly_draw,r.d.kelly_lose];
          return `<tr>
            <td class="left">${r.label}</td>
            ${odds.map(v=>`<td>${fodds(v)}</td>`).join('')}
            ${evVals.map((v,i)=>{let cls=evCls(v);if(i===maxEvI&&v>0)cls+=' best';return`<td class="${cls}">${f(v)}</td>`;}).join('')}
            ${klVals.map((v,i)=>{let cls=kellyCls(v);if(i===maxKlI&&v>0)cls+=' best-k';return`<td class="${cls}">${f(v)}</td>`;}).join('')}
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

function renderAnalysis(m) {
  const dims = [
    {key:'handicap',title:'盘口分析',icon:'📊'},
    {key:'bifad',title:'必发分析',icon:'💰'},
    {key:'injury',title:'伤停分析',icon:'🏥'},
    {key:'tactical',title:'战术克制',icon:'⚔️'},
    {key:'form',title:'状态战意',icon:'🔥'},
    {key:'uncertain',title:'不确定因素',icon:'❓'},
  ];
  return dims.map(d=>`
    <div class="analysis-item" onclick="this.classList.toggle('open')">
      <div class="analysis-header">
        <div class="title"><span class="icon">${d.icon}</span>${d.title}</div>
        <span class="chevron">▶</span>
      </div>
      <div class="analysis-body">
        <div class="analysis-content">${hlText(m.analysis[d.key])}</div>
      </div>
    </div>
  `).join('');
}

function renderPostMatchPending() {
  return `
  <div class="post-match" style="margin-top:20px">
    <div class="label">赛后追踪</div>
    <div class="result-row">
      <span class="pm-tag pending">⏳ 待赛</span>
      <span style="font-size:12px;color:var(--text3)">比赛尚未开始</span>
    </div>
  </div>`;
}

// ===== INTERACTIONS =====
function toggle(idx) { document.getElementById('mc-'+idx).classList.toggle('expanded'); }
function expandAll() { document.querySelectorAll('.match-card').forEach(c=>c.classList.add('expanded')); }
function collapseAll() { document.querySelectorAll('.match-card').forEach(c=>c.classList.remove('expanded')); }
function navDate(dir) {
  const i = dateKeys.indexOf(currentDateKey);
  const ni = i + dir;
  if(ni>=0 && ni<dateKeys.length) { currentDateKey = dateKeys[ni]; render(); }
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', function() {
  // Load data dynamically — dataUrl will be injected when generating the page link
  const dataUrl = 'football_data.js';
  if (dataUrl && dataUrl !== '__DATA_URL__') {
    loadDataAndRender(dataUrl);
  } else {
    // Fallback: try loading from same directory
    const scripts = document.querySelectorAll('script[data-data-url]');
    const url = scripts.length ? scripts[0].dataset.dataUrl : null;
    if (url) {
      loadDataAndRender(url);
    } else {
      document.getElementById('matchGrid').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div class="msg">数据加载中...</div></div>';
    }
  }
});
</script>
</body>
</html>
