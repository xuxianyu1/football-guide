<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ 五大联赛足球俱乐部图鉴</title>
<style>
/* ========== CSS Variables & Reset ========== */
:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #111827;
  --bg-card: #1a2235;
  --bg-card-hover: #1f2a40;
  --text-primary: #f0f2f5;
  --text-secondary: #9ca3af;
  --text-muted: #6b7280;
  --border-color: #2d3748;
  --epl-color: #3d195b;
  --epl-accent: #e90052;
  --laliga-color: #ee8707;
  --laliga-accent: #ff6b00;
  --seriea-color: #024494;
  --seriea-accent: #009246;
  --bundesliga-color: #d20515;
  --bundesliga-accent: #8b0000;
  --ligue1-color: #091c3e;
  --ligue1-accent: #1a5fbc;
  --transition-speed: 0.35s;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ========== Page Transitions ========== */
.page {
  display: none;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity var(--transition-speed) ease, transform var(--transition-speed) ease;
  min-height: 100vh;
}
.page.active {
  display: block;
}
.page.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ========== Scrollbar ========== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: #3a4560; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #4a5580; }

/* ========== Home Page ========== */
.home-header {
  text-align: center;
  padding: 60px 20px 40px;
  background: linear-gradient(135deg, #0a0e17 0%, #1a1a3e 50%, #0a0e17 100%);
  position: relative;
  overflow: hidden;
}
.home-header::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 50%, rgba(233,0,82,0.06) 0%, transparent 50%),
              radial-gradient(circle at 70% 50%, rgba(26,95,188,0.06) 0%, transparent 50%);
  animation: bgPulse 8s ease-in-out infinite alternate;
}
@keyframes bgPulse {
  0% { transform: scale(1) rotate(0deg); }
  100% { transform: scale(1.1) rotate(3deg); }
}
.home-title {
  font-size: clamp(1.8rem, 5vw, 3rem);
  font-weight: 800;
  position: relative;
  z-index: 1;
  background: linear-gradient(135deg, #fff 0%, #e0e7ff 50%, #c7d2fe 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.home-subtitle {
  font-size: clamp(0.9rem, 2.5vw, 1.1rem);
  color: var(--text-secondary);
  margin-top: 12px;
  position: relative;
  z-index: 1;
}

/* ========== League Grid ========== */
.league-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
  max-width: 1200px;
  margin: 40px auto;
  padding: 0 24px;
}

.league-card {
  position: relative;
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  border: 1px solid var(--border-color);
  background: var(--bg-card);
}
.league-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.league-card-accent {
  height: 6px;
  width: 100%;
}
.league-card-body {
  padding: 28px;
}
.league-card-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
}
.league-logo {
  width: 56px;
  height: 56px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 18px;
  color: #fff;
  flex-shrink: 0;
}
.league-card-title {
  font-size: 1.4rem;
  font-weight: 700;
}
.league-card-subtitle {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-top: 2px;
}
.league-card-count {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 600;
  background: rgba(255,255,255,0.08);
  color: var(--text-primary);
}
.league-card-arrow {
  position: absolute;
  right: 24px;
  bottom: 24px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.3s, transform 0.3s;
}
.league-card:hover .league-card-arrow {
  background: rgba(255,255,255,0.15);
  transform: translateX(4px);
}

/* ========== League Detail Page ========== */
.league-detail-header {
  padding: 50px 24px 40px;
  text-align: center;
  position: relative;
}
.league-detail-header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 10%;
  right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-color), transparent);
}
.league-back-btn {
  position: absolute;
  left: 24px;
  top: 24px;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  padding: 8px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.9rem;
  transition: all 0.25s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.league-back-btn:hover {
  background: rgba(255,255,255,0.15);
  transform: translateX(-2px);
}
.league-detail-title {
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  font-weight: 800;
}
.league-detail-sub {
  color: var(--text-secondary);
  margin-top: 8px;
  font-size: 0.95rem;
}

.club-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
  max-width: 1200px;
  margin: 36px auto;
  padding: 0 24px;
}

.club-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 14px;
  padding: 24px;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.club-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  opacity: 0;
  transition: opacity 0.3s;
}
.club-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 48px rgba(0,0,0,0.35);
  border-color: rgba(255,255,255,0.1);
}
.club-card:hover::before {
  opacity: 1;
}
.club-card-top {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 14px;
}
.club-badge {
  width: auto;
  height: auto;
  border-radius: 0;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.club-card-name {
  font-size: 1.15rem;
  font-weight: 700;
}
.club-card-nickname {
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-top: 2px;
}
.club-card-year {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 0.75rem;
  background: rgba(255,255,255,0.06);
  color: var(--text-muted);
  margin-top: 4px;
}

.more-coming {
  text-align: center;
  padding: 32px 24px 60px;
  color: var(--text-muted);
  font-size: 0.95rem;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* ========== Club Detail Page ========== */
.club-detail-header {
  padding: 40px 24px 30px;
  text-align: center;
  position: relative;
}
.club-detail-back {
  position: absolute;
  left: 24px;
  top: 24px;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  padding: 8px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.9rem;
  transition: all 0.25s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.club-detail-back:hover {
  background: rgba(255,255,255,0.15);
}
.club-detail-badge {
  width: auto;
  height: auto;
  border-radius: 0;
  margin: 0 auto 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.club-detail-name {
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  font-weight: 800;
}
.club-detail-meta {
  color: var(--text-secondary);
  margin-top: 8px;
  font-size: 0.9rem;
}

.club-content {
  max-width: 860px;
  margin: 0 auto;
  padding: 20px 24px 80px;
}

/* ========== Markdown Rendered Content ========== */
.md h2 {
  font-size: 1.5rem;
  font-weight: 700;
  margin: 40px 0 16px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--border-color);
}
.md h3 {
  font-size: 1.2rem;
  font-weight: 600;
  margin: 30px 0 12px;
  color: #e0e7ff;
}
.md h4 {
  font-size: 1.05rem;
  font-weight: 600;
  margin: 24px 0 10px;
  color: #c7d2fe;
}
.md p {
  margin: 10px 0;
  line-height: 1.8;
  color: var(--text-primary);
}
.md strong {
  color: #fbbf24;
  font-weight: 600;
}
.md em {
  color: #a5b4fc;
  font-style: italic;
}
.md ul, .md ol {
  margin: 10px 0;
  padding-left: 24px;
}
.md li {
  margin: 6px 0;
  line-height: 1.7;
  color: var(--text-primary);
}
.md blockquote {
  border-left: 3px solid #4f46e5;
  padding: 10px 16px;
  margin: 14px 0;
  background: rgba(79,70,229,0.08);
  border-radius: 0 8px 8px 0;
  color: var(--text-secondary);
  font-style: italic;
}
.md table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  font-size: 0.9rem;
}
.md th {
  background: var(--bg-card);
  padding: 10px 14px;
  text-align: left;
  font-weight: 600;
  border-bottom: 2px solid var(--border-color);
  color: #e0e7ff;
}
.md td {
  padding: 9px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  color: var(--text-primary);
}
.md tr:hover td {
  background: rgba(255,255,255,0.02);
}
.md code {
  background: rgba(255,255,255,0.08);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 0.88rem;
  font-family: 'SF Mono', 'Fira Code', monospace;
}
.md pre {
  background: #0d1117;
  padding: 16px;
  border-radius: 10px;
  overflow-x: auto;
  margin: 14px 0;
  font-size: 0.85rem;
  line-height: 1.6;
  border: 1px solid var(--border-color);
}
.md pre code {
  background: none;
  padding: 0;
}
.md hr {
  border: none;
  border-top: 1px solid var(--border-color);
  margin: 28px 0;
}
.md a {
  color: #818cf8;
  text-decoration: none;
}
.md a:hover {
  text-decoration: underline;
}

/* ========== Player Cards ========== */
.player-section {
  margin: 32px 0;
}
.player-section-title {
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 18px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--border-color);
}
.player-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 16px;
}
.player-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 20px;
  transition: all 0.25s;
}
.player-card:hover {
  border-color: rgba(255,255,255,0.12);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  transform: translateY(-2px);
}
.player-avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  margin-bottom: 12px;
}
.player-name {
  font-weight: 700;
  font-size: 1rem;
}
.player-pos {
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-top: 2px;
}
.player-years {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-top: 4px;
}
.player-stat {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid rgba(255,255,255,0.06);
  font-size: 0.82rem;
  color: #fbbf24;
}

/* ========== Footer ========== */
.page-footer {
  text-align: center;
  padding: 30px 24px;
  color: var(--text-muted);
  font-size: 0.8rem;
  border-top: 1px solid var(--border-color);
  margin-top: 40px;
}

/* ========== Responsive ========== */
@media (max-width: 640px) {
  .home-header { padding: 40px 16px 28px; }
  .league-grid { padding: 0 16px; gap: 16px; }
  .club-grid { padding: 0 16px; gap: 14px; }
  .club-content { padding: 16px 16px 60px; }
  .league-back-btn, .club-detail-back { left: 12px; top: 12px; padding: 6px 12px; font-size: 0.82rem; }
  .league-detail-header { padding: 40px 16px 30px; }
  .club-detail-header { padding: 36px 16px 24px; }
  .player-grid { grid-template-columns: 1fr; }
}

/* ========== Animations ========== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-in {
  animation: fadeInUp 0.5s ease forwards;
}
.delay-1 { animation-delay: 0.1s; opacity: 0; }
.delay-2 { animation-delay: 0.2s; opacity: 0; }
.delay-3 { animation-delay: 0.3s; opacity: 0; }
.delay-4 { animation-delay: 0.4s; opacity: 0; }
.delay-5 { animation-delay: 0.5s; opacity: 0; }

/* ========== CSS Crests ========== */
.crest {
  width: 52px;
  height: 60px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.crest-large {
  width: 80px;
  height: 92px;
}
.crest-inner {
  width: 100%;
  height: 100%;
  clip-path: polygon(50% 0%, 95% 15%, 95% 70%, 50% 100%, 5% 70%, 5% 15%);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
.crest-letter {
  font-weight: 900;
  font-size: 16px;
  color: #fff;
  text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  line-height: 1;
}
.crest-large .crest-letter {
  font-size: 24px;
}
.crest-sub {
  font-size: 8px;
  color: rgba(255,255,255,0.8);
  font-weight: 700;
  letter-spacing: 1px;
}
.crest-large .crest-sub {
  font-size: 11px;
}
/* Stripe effect for certain crests */
.crest-stripes {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}
.crest-stripes-bar {
  position: absolute;
  top: 0;
  width: 14.28%;
  height: 100%;
}
.crest-logo-circle {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.08);
  overflow: hidden;
  flex-shrink: 0;
}
.crest-large .crest-logo-circle {
  width: 80px;
  height: 80px;
}
.crest-logo-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
}

/* ========== Top Navigation Bar ========== */
.top-nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: rgba(10,14,23,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  padding: 0 20px;
  height: 48px;
  gap: 6px;
}
.top-nav a {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 0.85rem;
  padding: 8px 14px;
  border-radius: 8px;
  transition: all 0.2s ease;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 5px;
}
.top-nav a:hover {
  background: rgba(255,255,255,0.08);
  color: #fff;
}
.top-nav a.active {
  background: rgba(96,165,250,0.15);
  color: #60a5fa;
}
.top-nav .nav-icon {
  font-size: 1rem;
}
.top-nav .nav-brand {
  font-weight: 700;
  font-size: 0.95rem;
  color: #fff;
  margin-right: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
body {
  padding-top: 48px;
}
</style>
</head>

法甲末轮，19岁小将费因杜诺第89分钟绝杀！波尔多险胜同时马赛输球，第五个法甲冠军在最后一分钟到手。

> 波尔多主场对马赛保持44年不败（1978-2022）。吉雷瑟是法国足球的"短腿天才"，身高仅1米63却拥有最敏锐的足球大脑。齐达内加盟时说"我不是进攻型中场"，结果首赛季就打入10球——天才的谦虚。波尔多的倒V形球衣设计是法甲最具辨识度的队服之一。`

// ====================================================================
// NAVIGATION
// ====================================================================
let currentLeague = null;
let currentClub = null;

function navigateTo(page, data) {
  // Hide all pages
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('visible');
    setTimeout(() => p.classList.remove('active'), 350);
  });

  setTimeout(() => {
    const target = document.getElementById('page-' + page);
    target.classList.add('active');

    if (page === 'home') renderHome();
    else if (page === 'league') renderLeague(data);
    else if (page === 'club') renderClub(data);

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        target.classList.add('visible');
      });
    });
    window.scrollTo(0, 0);
  }, 360);
}

function goBackToLeague() {
  if (currentLeague) navigateTo('league', currentLeague);
}

// ====================================================================
// RENDER HOME
// ====================================================================
function renderHome() {
  const grid = document.getElementById('league-grid');
  grid.innerHTML = '';
  let totalClubs = 0;

  const leagueOrder = ['epl','laliga','seriea','bundesliga','ligue1'];
  leagueOrder.forEach((lid, idx) => {
    const league = DATA.leagues[lid];
    totalClubs += league.clubs.length;

    const card = document.createElement('div');
    card.className = `league-card animate-in delay-${idx + 1}`;
    card.onclick = () => {
      currentLeague = lid;
      navigateTo('league', lid);
    };
    card.innerHTML = `
      <div class="league-card-accent" style="background:linear-gradient(90deg,${league.color},${league.bgColor})"></div>
      <div class="league-card-body">
        <div class="league-card-header">
          <div class="league-logo" style="background:linear-gradient(135deg,${league.color},${league.bgColor})">${league.logoText}</div>
          <div>
            <div class="league-card-title">${league.name}</div>
            <div class="league-card-subtitle">${league.fullName}</div>
          </div>
        </div>
        <div class="league-card-count">⚽ 已介绍 ${league.clubs.length} 支球队</div>
      </div>
      <div class="league-card-arrow">→</div>
    `;
    grid.appendChild(card);
  });

  document.getElementById('total-clubs').textContent = totalClubs;
}

// ====================================================================
// RENDER LEAGUE DETAIL
// ====================================================================
function renderLeague(leagueId) {
  const league = DATA.leagues[leagueId];
  document.getElementById('league-title').textContent = league.fullName;
  document.getElementById('league-title').style.color = league.color;
  document.getElementById('league-sub').textContent = `已介绍 ${league.clubs.length} 支俱乐部`;

  const grid = document.getElementById('club-grid');
  grid.innerHTML = '';

  league.clubs.forEach((cid, idx) => {
    const club = DATA.clubs[cid];
    const card = document.createElement('div');
    card.className = `club-card animate-in delay-${idx + 1}`;
    card.style.cssText = `--club-color:${club.colors[0]}`;
    card.querySelector?.('.club-card::before')?.style;
    card.onclick = () => {
      currentClub = cid;
      navigateTo('club', cid);
    };
    card.innerHTML = `
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${club.colors[0]};opacity:0;transition:opacity 0.3s;" class="club-top-bar"></div>
      <div class="club-card-top">
        <div class="club-badge">${buildCrestHTML(club, false)}</div>
        <div>
          <div class="club-card-name">${club.name}</div>
          <div class="club-card-nickname">${club.nickname}</div>
        </div>
      </div>
      <div class="club-card-year">成立于 ${club.founded} 年</div>
    `;
    card.addEventListener('mouseenter', () => {
      card.querySelector('.club-top-bar').style.opacity = '1';
    });
    card.addEventListener('mouseleave', () => {
      card.querySelector('.club-top-bar').style.opacity = '0';
    });
    grid.appendChild(card);
  });
}

// ====================================================================
// BUILD CSS CREST HTML
// ====================================================================
function buildCrestHTML(club, large) {
  const sizeClass = large ? 'crest-large' : '';
  const letterColor = club.crestTextDark ? '#000' : '#fff';
  const subColor = club.crestTextDark ? 'rgba(0,0,0,0.7)' : 'rgba(255,255,255,0.8)';

  // 如果有真实图片logo，使用圆形容器
  if (club.logo) {
    return `<div class="crest ${sizeClass}" style="width:auto;height:auto;">
      <div class="crest-logo-circle">
        <img src="${club.logo}" alt="${club.name}" class="crest-logo-img" onerror="this.style.display='none';this.parentNode.innerHTML='<span class=\\'crest-letter\\'>${club.crestLetter}</span>'">
      </div>
    </div>`;
  }

  if (club.crestType === 'stripes' && club.stripes) {
    let bars = '';
    for (let i = 0; i < 7; i++) {
      const color = i % 2 === 0 ? club.stripes[0] : club.stripes[1];
      bars += `<div class="crest-stripes-bar" style="left:${i*14.28}%;background:${color}"></div>`;
    }
    return `<div class="crest ${sizeClass}">
      <div class="crest-inner" style="background:${club.stripes[0]}">
        <div class="crest-stripes">${bars}</div>
        <span class="crest-letter" style="color:${letterColor};position:relative;z-index:2">${club.crestLetter}</span>
        ${club.crestSub ? `<span class="crest-sub" style="color:${subColor};position:relative;z-index:2">${club.crestSub}</span>` : ''}
      </div>
    </div>`;
  }

  if (club.crestType === 'crown') {
    return `<div class="crest ${sizeClass}">
      <div class="crest-inner" style="background:linear-gradient(180deg,#FFD700 0%,#FFD700 22%,${club.crestBg} 22%)">
        <span style="position:relative;z-index:2;font-size:${large?'18':'12'}px;color:#FFD700;">♛</span>
        <span class="crest-letter" style="color:${letterColor};position:relative;z-index:2;margin-top:-2px">${club.crestLetter}</span>
        ${club.crestSub ? `<span class="crest-sub" style="color:${subColor};position:relative;z-index:2">${club.crestSub}</span>` : ''}
      </div>
    </div>`;
  }

  // Solid
  return `<div class="crest ${sizeClass}">
    <div class="crest-inner" style="background:${club.crestBg}">
      <span class="crest-letter" style="color:${letterColor}">${club.crestLetter}</span>
      ${club.crestSub ? `<span class="crest-sub" style="color:${subColor}">${club.crestSub}</span>` : ''}
    </div>
  </div>`;
}

// ====================================================================
// RENDER CLUB DETAIL
// ====================================================================
function renderClub(clubId) {
  const club = DATA.clubs[clubId];
  const league = DATA.leagues[club.league];

  document.getElementById('club-badge').innerHTML = buildCrestHTML(club, true);
  document.getElementById('club-title').textContent = club.fullName;
  document.getElementById('club-title').style.color = club.colors[0];
  document.getElementById('club-meta').textContent = `${league.name} · ${club.nickname} · 成立于 ${club.founded} 年`;

  // Render players
  const playersDiv = document.getElementById('club-players');
  playersDiv.innerHTML = `
    <div class="player-section-title">⭐ 历史性球员</div>
    <div class="player-grid">
      ${club.players.map(p => `
        <div class="player-card">
          <div class="player-avatar" style="background:linear-gradient(135deg,${club.colors[0]},${club.colors[1] || club.colors[0]})">${p.emoji}</div>
          <div class="player-name">${p.name}</div>
          <div class="player-pos">${p.pos}</div>
          <div class="player-years">${p.years}</div>
          <div class="player-stat">${p.stat}</div>
        </div>
      `).join('')}
    </div>
  `;

  // Render markdown content
  document.getElementById('club-body').innerHTML = parseMD(club.content);
}

// ====================================================================
// SIMPLE MARKDOWN PARSER
// ====================================================================
function parseMD(text) {
  let html = text;

  // Code blocks (pre)
  html = html.replace(/```([\s\S]*?)```/g, (_, code) => `<pre><code>${escHTML(code.trim())}</code></pre>`);
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Headers
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');

  // Horizontal rules
  html = html.replace(/^---+$/gm, '<hr>');

  // Bold & Italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Blockquotes
  html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // Merge consecutive blockquotes
  html = html.replace(/<\/blockquote>\n<blockquote>/g, '<br>');

  // Tables
  html = html.replace(/(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)*)/g, (_, header, sep, body) => {
    const headers = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
    const rows = body.trim().split('\n').map(row => {
      const cells = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
      return `<tr>${cells}</tr>`;
    }).join('');
    return `<table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table>`;
  });

  // Unordered lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

  // Paragraphs: wrap lines that aren't already wrapped
  html = html.split('\n\n').map(block => {
    block = block.trim();
    if (!block) return '';
    if (block.startsWith('<')) return block;
    return `<p>${block}</p>`;
  }).join('\n');

  // Fix line breaks within paragraphs
  html = html.replace(/\n(?!<)/g, '<br>');

  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  return html;
}

function escHTML(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ====================================================================
// INIT
// ====================================================================
document.addEventListener('DOMContentLoaded', () => {
  const homePage = document.getElementById('page-home');
  homePage.classList.add('active');
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      homePage.classList.add('visible');
    });
  });
  renderHome();
});
</script>
