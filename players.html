<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⭐ 五大联赛球星图鉴</title>
<style>
/* ========== CSS Variables & Reset ========== */
:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #111827;
  --bg-card: #1a2235;
  --bg-card-hover: #1f2a40;
  --text-primary: #f0f2f5;
  --text-secondary: #9ca3af;
  --text-muted: #6b7280;
  --border-color: #2d3748;
  --transition-speed: 0.35s;
  --accent-blue: #60a5fa;
  --accent-blue-dim: rgba(96,165,250,0.15);
  --accent-green: #34d399;
  --accent-green-dim: rgba(52,211,153,0.15);
  --accent-amber: #fbbf24;
  --accent-amber-dim: rgba(251,191,36,0.15);
  --accent-purple: #a78bfa;
  --accent-purple-dim: rgba(167,139,250,0.15);
  --accent-red: #f87171;
  --accent-red-dim: rgba(248,113,113,0.15);
  --accent-cyan: #22d3ee;
  --accent-cyan-dim: rgba(34,211,238,0.15);
  /* Position theme colors */
  --forward-primary: #fbbf24;
  --forward-secondary: #f87171;
  --forward-bg: rgba(251,191,36,0.08);
  --forward-gradient: linear-gradient(135deg, #fbbf24, #f87171);
  --midfielder-primary: #60a5fa;
  --midfielder-secondary: #22d3ee;
  --midfielder-bg: rgba(96,165,250,0.08);
  --midfielder-gradient: linear-gradient(135deg, #60a5fa, #22d3ee);
  --defender-primary: #a78bfa;
  --defender-secondary: #818cf8;
  --defender-bg: rgba(167,139,250,0.08);
  --defender-gradient: linear-gradient(135deg, #a78bfa, #818cf8);
  --goalkeeper-primary: #34d399;
  --goalkeeper-secondary: #fbbf24;
  --goalkeeper-bg: rgba(52,211,153,0.08);
  --goalkeeper-gradient: linear-gradient(135deg, #34d399, #fbbf24);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  padding-top: 48px;
}

/* ========== Page Transitions ========== */
.page {
  display: none;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity var(--transition-speed) ease, transform var(--transition-speed) ease;
  min-height: calc(100vh - 48px);
}
.page.active { display: block; }
.page.visible { opacity: 1; transform: translateY(0); }

/* ========== Scrollbar ========== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: #3a4560; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #4a5580; }

/* ========== Top Navigation Bar ========== */
.top-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: rgba(10,14,23,0.92); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; padding: 0 20px; height: 48px; gap: 6px;
  overflow-x: auto;
}
.top-nav a {
  color: #9ca3af; text-decoration: none; font-size: 0.85rem;
  padding: 8px 14px; border-radius: 8px; transition: all 0.2s ease;
  white-space: nowrap; display: flex; align-items: center; gap: 5px;
}
.top-nav a:hover { background: rgba(255,255,255,0.08); color: #fff; }
.top-nav a.active { background: rgba(251,191,36,0.15); color: #fbbf24; }
.top-nav .nav-icon { font-size: 1rem; }
.top-nav .nav-brand {
  font-weight: 700; font-size: 0.95rem; color: #fff;
  margin-right: 8px; display: flex; align-items: center; gap: 6px;
  flex-shrink: 0;
}

/* ========== HOME PAGE ========== */
.home-header {
  text-align: center; padding: 60px 20px 40px;
  background: linear-gradient(135deg, #0a0e17 0%, #1a1a3e 50%, #0a0e17 100%);
  position: relative; overflow: hidden;
}
.home-header::before {
  content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
  background: radial-gradient(circle at 30% 50%, rgba(251,191,36,0.06) 0%, transparent 50%),
              radial-gradient(circle at 70% 50%, rgba(248,113,113,0.06) 0%, transparent 50%);
  animation: bgPulse 8s ease-in-out infinite alternate;
}
@keyframes bgPulse {
  0% { transform: scale(1) rotate(0deg); }
  100% { transform: scale(1.1) rotate(3deg); }
}
.home-title {
  font-size: clamp(1.8rem, 5vw, 3rem); font-weight: 800; position: relative; z-index: 1;
  background: linear-gradient(135deg, #fff 0%, #fde68a 50%, #fbbf24 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.home-subtitle {
  font-size: clamp(0.9rem, 2.5vw, 1.1rem); color: var(--text-secondary);
  margin-top: 12px; position: relative; z-index: 1;
}

/* Position Grid */
.position-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px; padding: 32px 24px; max-width: 1200px; margin: 0 auto;
}
.position-card {
  background: var(--bg-card); border: 1px solid var(--border-color);
  border-radius: 16px; padding: 28px 24px; cursor: pointer;
  transition: all var(--transition-speed) ease; position: relative; overflow: hidden;
}
.position-card:hover {
  background: var(--bg-card-hover); border-color: rgba(255,255,255,0.12);
  transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.4);
}
.position-card::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  border-radius: 16px 16px 0 0; opacity: 0; transition: opacity var(--transition-speed);
}
.position-card:hover::after { opacity: 1; }
.position-card[data-pos="forward"]::after { background: var(--forward-gradient); }
.position-card[data-pos="forward"]:hover { border-color: rgba(251,191,36,0.3); }
.position-card[data-pos="midfielder"]::after { background: var(--midfielder-gradient); }
.position-card[data-pos="midfielder"]:hover { border-color: rgba(96,165,250,0.3); }
.position-card[data-pos="defender"]::after { background: var(--defender-gradient); }
.position-card[data-pos="defender"]:hover { border-color: rgba(167,139,250,0.3); }
.position-card[data-pos="goalkeeper"]::after { background: var(--goalkeeper-gradient); }
.position-card[data-pos="goalkeeper"]:hover { border-color: rgba(52,211,153,0.3); }

.position-emoji { font-size: 2.8rem; margin-bottom: 14px; }
.position-name { font-size: 1.3rem; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
.position-desc { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 14px; }
.position-count {
  font-size: 0.8rem; color: var(--text-secondary);
  background: rgba(255,255,255,0.05); display: inline-block;
  padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border-color);
}

/* Footer */
.page-footer {
  text-align: center; padding: 28px 20px; color: var(--text-muted);
  font-size: 0.85rem; border-top: 1px solid var(--border-color);
  margin-top: 40px;
}

/* ========== POSITION LIST PAGE ========== */
.list-header {
  padding: 40px 24px 20px; max-width: 1200px; margin: 0 auto;
}
.back-btn {
  background: rgba(255,255,255,0.06); border: 1px solid var(--border-color);
  color: var(--text-secondary); padding: 8px 18px; border-radius: 10px;
  cursor: pointer; font-size: 0.9rem; transition: all 0.2s;
  display: inline-flex; align-items: center; gap: 6px; margin-bottom: 20px;
}
.back-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); border-color: rgba(255,255,255,0.15); }
.list-title {
  font-size: clamp(1.5rem, 4vw, 2.2rem); font-weight: 800;
  display: flex; align-items: center; gap: 12px;
}
.list-title .emoji { font-size: 1.6em; }

/* Player Grid */
.player-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 18px; padding: 12px 24px 40px; max-width: 1200px; margin: 0 auto;
}
.player-card {
  background: var(--bg-card); border: 1px solid var(--border-color);
  border-radius: 16px; padding: 24px; cursor: pointer;
  transition: all var(--transition-speed) ease; position: relative; overflow: hidden;
}
.player-card:hover {
  background: var(--bg-card-hover); border-color: rgba(255,255,255,0.12);
  transform: translateY(-3px); box-shadow: 0 10px 36px rgba(0,0,0,0.35);
}
.player-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  opacity: 0; transition: opacity var(--transition-speed);
}
.player-card:hover::before { opacity: 1; }
.player-card[data-pos="forward"]::before { background: var(--forward-gradient); }
.player-card[data-pos="forward"]:hover { border-color: rgba(251,191,36,0.25); }
.player-card[data-pos="midfielder"]::before { background: var(--midfielder-gradient); }
.player-card[data-pos="midfielder"]:hover { border-color: rgba(96,165,250,0.25); }
.player-card[data-pos="defender"]::before { background: var(--defender-gradient); }
.player-card[data-pos="defender"]:hover { border-color: rgba(167,139,250,0.25); }
.player-card[data-pos="goalkeeper"]::before { background: var(--goalkeeper-gradient); }
.player-card[data-pos="goalkeeper"]:hover { border-color: rgba(52,211,153,0.25); }

.player-card-top {
  display: flex; align-items: center; gap: 16px; margin-bottom: 14px;
}
.player-avatar-wrap {
  position: relative; flex-shrink: 0;
}
.player-avatar {
  width: 64px; height: 64px; border-radius: 50%;
  border: 2.5px solid var(--border-color);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; overflow: hidden;
  transition: border-color 0.3s;
}
.player-avatar img {
  width: 100%; height: 100%; object-fit: cover;
}
.player-card[data-pos="forward"] .player-avatar { border-color: rgba(251,191,36,0.5); }
.player-card[data-pos="midfielder"] .player-avatar { border-color: rgba(96,165,250,0.5); }
.player-card[data-pos="defender"] .player-avatar { border-color: rgba(167,139,250,0.5); }
.player-card[data-pos="goalkeeper"] .player-avatar { border-color: rgba(52,211,153,0.5); }

.player-card-info { min-width: 0; flex: 1; }
.player-card-name {
  font-size: 1.15rem; font-weight: 700; color: var(--text-primary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  display: flex; align-items: center; gap: 6px;
}
.player-card-flag { font-size: 1.1rem; }
.player-card-eng {
  font-size: 0.78rem; color: var(--text-muted); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.player-card-club {
  font-size: 0.82rem; color: var(--text-secondary); margin-top: 4px;
  display: flex; align-items: center; gap: 6px;
}
.player-card-club-logo {
  width: 20px; height: 20px; border-radius: 50%; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.08); flex-shrink: 0;
}
.player-card-club-logo img {
  width: 100%; height: 100%; object-fit: cover;
}
.player-card-club .current-badge {
  background: var(--accent-green-dim); color: var(--accent-green);
  padding: 1px 7px; border-radius: 4px; font-size: 0.7rem; font-weight: 600;
}
.player-card-tags {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px;
}
.player-tag {
  font-size: 0.72rem; padding: 3px 10px; border-radius: 6px;
  border: 1px solid var(--border-color); background: rgba(255,255,255,0.03);
  color: var(--text-secondary); white-space: nowrap;
  transition: all 0.2s;
}
.player-tag.gold {
  background: var(--accent-amber-dim); color: var(--accent-amber);
  border-color: rgba(251,191,36,0.25);
}
.player-tag.blue {
  background: var(--accent-blue-dim); color: var(--accent-blue);
  border-color: rgba(96,165,250,0.25);
}
.player-tag.purple {
  background: var(--accent-purple-dim); color: var(--accent-purple);
  border-color: rgba(167,139,250,0.25);
}
.player-tag.green {
  background: var(--accent-green-dim); color: var(--accent-green);
  border-color: rgba(52,211,153,0.25);
}
.player-card:hover .player-tag { border-color: rgba(255,255,255,0.12); }

/* ========== PLAYER DETAIL PAGE ========== */
.detail-container {
  max-width: 800px; margin: 0 auto; padding: 20px 24px 60px;
}
.detail-back {
  margin-bottom: 24px;
}

/* Hero Area */
.detail-hero {
  text-align: center; padding: 48px 20px 36px;
  position: relative; border-radius: 20px; overflow: hidden;
  margin-bottom: 8px;
}
.detail-hero::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  z-index: 0; opacity: 0.15;
}
.detail-hero[data-pos="forward"]::before { background: var(--forward-gradient); }
.detail-hero[data-pos="midfielder"]::before { background: var(--midfielder-gradient); }
.detail-hero[data-pos="defender"]::before { background: var(--defender-gradient); }
.detail-hero[data-pos="goalkeeper"]::before { background: var(--goalkeeper-gradient); }

.detail-hero-content {
  position: relative; z-index: 1;
}
.detail-avatar-wrap {
  position: relative; display: inline-block; margin-bottom: 18px;
}
.detail-avatar {
  width: 130px; height: 130px; border-radius: 50%;
  background: linear-gradient(135deg, var(--bg-secondary), #2a3550);
  border: 3px solid var(--border-color); margin: 0 auto;
  display: flex; align-items: center; justify-content: center;
  font-size: 3rem; overflow: hidden;
  box-shadow: 0 0 40px rgba(251,191,36,0.1);
  position: relative;
}
.detail-avatar img {
  width: 100%; height: 100%; object-fit: cover;
}
.detail-hero[data-pos="forward"] .detail-avatar { border-color: rgba(251,191,36,0.6); box-shadow: 0 0 40px rgba(251,191,36,0.15); }
.detail-hero[data-pos="midfielder"] .detail-avatar { border-color: rgba(96,165,250,0.6); box-shadow: 0 0 40px rgba(96,165,250,0.15); }
.detail-hero[data-pos="defender"] .detail-avatar { border-color: rgba(167,139,250,0.6); box-shadow: 0 0 40px rgba(167,139,250,0.15); }
.detail-hero[data-pos="goalkeeper"] .detail-avatar { border-color: rgba(52,211,153,0.6); box-shadow: 0 0 40px rgba(52,211,153,0.15); }

.detail-hero-club-logo {
  position: absolute; bottom: 2px; right: 2px;
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--bg-primary); border: 2px solid var(--border-color);
  overflow: hidden; display: flex; align-items: center; justify-content: center;
}
.detail-hero-club-logo img {
  width: 100%; height: 100%; object-fit: cover;
}

.detail-name {
  font-size: 2rem; font-weight: 800; display: flex; align-items: center;
  justify-content: center; gap: 10px;
}
.detail-name .flag { font-size: 1.5rem; }
.detail-eng-name { font-size: 0.95rem; color: var(--text-muted); margin-top: 4px; }

/* Tags in detail */
.detail-tags {
  display: flex; flex-wrap: wrap; gap: 8px; margin: 20px 0; justify-content: center;
}
.detail-tag {
  font-size: 0.82rem; padding: 6px 16px; border-radius: 20px; font-weight: 600;
  transition: transform 0.2s;
}
.detail-tag:hover { transform: scale(1.05); }
.detail-tag.gold { background: var(--accent-amber-dim); color: var(--accent-amber); border: 1px solid rgba(251,191,36,0.3); }
.detail-tag.blue { background: var(--accent-blue-dim); color: var(--accent-blue); border: 1px solid rgba(96,165,250,0.3); }
.detail-tag.purple { background: var(--accent-purple-dim); color: var(--accent-purple); border: 1px solid rgba(167,139,250,0.3); }
.detail-tag.green { background: var(--accent-green-dim); color: var(--accent-green); border: 1px solid rgba(52,211,153,0.3); }

/* Info Grid */
.detail-info-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px; margin: 28px 0;
}
.detail-info-item {
  background: var(--bg-card); border: 1px solid var(--border-color);
  border-radius: 12px; padding: 14px 16px;
  transition: all 0.2s;
}
.detail-info-item:hover {
  border-color: rgba(255,255,255,0.12); background: var(--bg-card-hover);
  transform: translateY(-1px);
}
.detail-info-label {
  font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 1.5px; margin-bottom: 6px;
}
.detail-info-value { font-size: 1rem; font-weight: 600; color: var(--text-primary); }
.detail-info-value.club-value {
  display: flex; align-items: center; gap: 6px;
}
.detail-info-value .mini-club-logo {
  width: 22px; height: 22px; border-radius: 50%; overflow: hidden;
  display: inline-flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.08); flex-shrink: 0;
}
.detail-info-value .mini-club-logo img {
  width: 100%; height: 100%; object-fit: cover;
}

/* Section */
.detail-section {
  margin: 32px 0;
}
.detail-section-title {
  font-size: 1.1rem; font-weight: 700; color: var(--text-primary);
  margin-bottom: 18px; display: flex; align-items: center; gap: 10px;
  padding-bottom: 10px; border-bottom: 1px solid var(--border-color);
}
.detail-section-title .icon { font-size: 1.2rem; }

/* ========== Market Value SVG Chart ========== */
.mv-chart-container {
  background: var(--bg-card); border: 1px solid var(--border-color);
  border-radius: 14px; padding: 24px 20px 16px; overflow: hidden;
}
.mv-chart-container svg { width: 100%; height: auto; }
.mv-chart-tooltip {
  position: absolute; background: rgba(17,24,39,0.95); border: 1px solid var(--border-color);
  border-radius: 10px; padding: 10px 14px; font-size: 0.82rem; pointer-events: none;
  opacity: 0; transition: opacity 0.2s; z-index: 10;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.mv-chart-tooltip.visible { opacity: 1; }
.mv-chart-tooltip .tt-year { color: var(--accent-blue); font-weight: 600; }
.mv-chart-tooltip .tt-value { color: var(--accent-amber); font-weight: 700; font-size: 1rem; margin: 2px 0; }
.mv-chart-tooltip .tt-note { color: var(--text-secondary); }

/* ========== Transfer Timeline ========== */
.transfer-timeline {
  display: flex; flex-direction: column; gap: 0;
}
.transfer-item {
  display: flex; align-items: stretch; gap: 16px; position: relative;
}
.transfer-line {
  width: 2px; background: var(--border-color); position: relative; flex-shrink: 0;
}
.transfer-dot {
  width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--accent-green);
  background: var(--bg-primary); position: absolute; top: 20px; left: -6px; z-index: 1;
}
.transfer-item:last-child .transfer-line { background: transparent; }
.transfer-content {
  flex: 1; background: var(--bg-card); border: 1px solid var(--border-color);
  border-radius: 12px; padding: 16px 20px; margin-bottom: 12px;
  transition: all 0.2s;
}
.transfer-content:hover { border-color: rgba(255,255,255,0.12); background: var(--bg-card-hover); }
.transfer-year { font-size: 0.78rem; color: var(--accent-green); font-weight: 600; }
.transfer-route {
  font-size: 0.95rem; color: var(--text-primary); margin: 8px 0;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.transfer-club-logo {
  width: 28px; height: 28px; border-radius: 50%; overflow: hidden;
  display: inline-flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.06); flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.1);
}
.transfer-club-logo img {
  width: 100%; height: 100%; object-fit: cover;
}
.transfer-club-name {
  font-weight: 600;
}
.transfer-arrow {
  color: var(--accent-amber); font-size: 1.2rem; flex-shrink: 0;
  display: flex; align-items: center;
}
.transfer-fee {
  font-size: 0.82rem; color: var(--accent-amber); font-weight: 600;
  background: var(--accent-amber-dim); padding: 2px 10px; border-radius: 6px;
  display: inline-block;
}

/* ========== Milestones ========== */
.milestone-list {
  display: flex; flex-direction: column; gap: 0;
}
.milestone-item {
  display: flex; align-items: stretch; gap: 16px; position: relative;
}
.milestone-line {
  width: 2px; background: var(--border-color); position: relative; flex-shrink: 0;
}
.milestone-dot {
  width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--accent-purple);
  background: var(--bg-primary); position: absolute; top: 16px; left: -6px; z-index: 1;
}
.milestone-item:last-child .milestone-line { background: transparent; }
.milestone-content {
  flex: 1; background: var(--bg-card); border: 1px solid var(--border-color);
  border-radius: 12px; padding: 14px 18px; margin-bottom: 12px;
  transition: all 0.2s;
}
.milestone-content:hover { border-color: rgba(255,255,255,0.12); background: var(--bg-card-hover); }
.milestone-year { font-size: 0.78rem; color: var(--accent-purple); font-weight: 600; }
.milestone-event { font-size: 0.95rem; color: var(--text-primary); margin-top: 4px; line-height: 1.5; }

/* ========== Highlights ========== */
.highlight-list { display: flex; flex-direction: column; gap: 14px; }
.highlight-card {
  background: var(--bg-card); border: 1px solid var(--border-color);
  border-radius: 14px; padding: 20px 22px; position: relative; overflow: hidden;
  transition: all 0.2s;
}
.highlight-card:hover { border-color: rgba(255,255,255,0.12); background: var(--bg-card-hover); transform: translateY(-1px); }
.highlight-card::before {

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-in {
  animation: fadeInUp 0.5s ease forwards;
}
.delay-1 { animation-delay: 0.1s; opacity: 0; }
.delay-2 { animation-delay: 0.2s; opacity: 0; }
.delay-3 { animation-delay: 0.3s; opacity: 0; }
.delay-4 { animation-delay: 0.4s; opacity: 0; }

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
.player-avatar-wrap::after {

// ==================== STATE ====================
let currentView = 'home';
let currentPosition = null;
let currentPlayer = null;

// ==================== HELPER: Build club logo HTML ====================
function clubLogoHTML(url, size) {
  if (!url) return '';
  const s = size || 20;
  return `<span class="mini-club-logo" style="width:${s}px;height:${s}px;"><img src="${url}" alt="" onerror="this.style.display='none'"></span>`;
}

function transferClubLogoHTML(url, size) {
  const s = size || 28;
  if (!url) return `<span class="transfer-club-logo" style="width:${s}px;height:${s}px;font-size:${s*0.5}px;">⚽</span>`;
  return `<span class="transfer-club-logo" style="width:${s}px;height:${s}px;"><img src="${url}" alt="" onerror="this.style.display='none';this.parentNode.innerHTML='⚽'"></span>`;
}

// ==================== NAVIGATION ====================
function navigateTo(view, data) {
  const targetId = view === 'home' ? 'page-home' : view === 'list' ? 'page-list' : 'page-detail';

  document.querySelectorAll('.page').forEach(p => {
    if (p.id === targetId) return;
    p.classList.remove('visible');
    setTimeout(() => p.classList.remove('active'), 350);
  });

  if (view === 'home') {
    currentView = 'home';
    renderHome();
    showPage('page-home');
    window.scrollTo(0, 0);
  } else if (view === 'list') {
    currentView = 'list';
    currentPosition = data;
    renderList(data);
    showPage('page-list');
    window.scrollTo(0, 0);
  } else if (view === 'detail') {
    currentView = 'detail';
    currentPlayer = data;
    renderDetail(data);
    showPage('page-detail');
    window.scrollTo(0, 0);
  }
}

function showPage(id) {
  const page = document.getElementById(id);
  page.classList.add('active');
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      page.classList.add('visible');
    });
  });
}

// ==================== RENDER HOME ====================

  const grid = document.getElementById('position-grid');

// ==================== BUILD SVG MARKET VALUE CHART ====================
function buildMVChart(marketValue, position, transfers) {
  if (!marketValue || marketValue.length < 2) return '<p style="color:var(--text-muted);text-align:center;padding:20px;">数据不足</p>';

  const values = marketValue.map(v => v.valueNum);
  const maxVal = Math.max(...values);
  const minVal = Math.min(...values);
  const range = maxVal - minVal || 1;

  const W = 780, H = 320;
  const padL = 55, padR = 30, padT = 30, padB = 70;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  // Color based on position
  const colors = {
    forward: { line: '#fbbf24', dot: '#f87171', fill1: 'rgba(251,191,36,0.3)', fill2: 'rgba(248,113,113,0.02)' },
    midfielder: { line: '#60a5fa', dot: '#22d3ee', fill1: 'rgba(96,165,250,0.3)', fill2: 'rgba(34,211,238,0.02)' },
    defender: { line: '#a78bfa', dot: '#818cf8', fill1: 'rgba(167,139,250,0.3)', fill2: 'rgba(129,140,248,0.02)' },
    goalkeeper: { line: '#34d399', dot: '#fbbf24', fill1: 'rgba(52,211,153,0.3)', fill2: 'rgba(251,191,36,0.02)' }
  };
  const c = colors[position] || colors.forward;

  // Build year range from market value data
  const years = marketValue.map(v => parseInt(v.year));
  const minYear = Math.min(...years);
  const maxYear = Math.max(...years);
  const yearRange = maxYear - minYear || 1;

  // Map a year to x position (continuous scale)
  function yearToX(year) {
    return padL + ((parseInt(year) - minYear) / yearRange) * chartW;
  }

  // Points
  const points = marketValue.map(mv => {
    const x = yearToX(mv.year);
    const y = padT + chartH - ((mv.valueNum - minVal) / range) * chartH * 0.85 - chartH * 0.05;
    return { x, y, ...mv };
  });

  // Sort points by x for proper path
  points.sort((a, b) => a.x - b.x);

  const n = points.length;

  // SVG path
  const linePath = points.map((p, i) => (i === 0 ? 'M' : 'L') + p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ');
  const areaPath = linePath + ` L${points[n-1].x.toFixed(1)},${(padT + chartH).toFixed(1)} L${points[0].x.toFixed(1)},${(padT + chartH).toFixed(1)} Z`;

  // Y-axis labels
  const yTicks = 5;
  let yAxisHtml = '';
  for (let i = 0; i <= yTicks; i++) {
    const val = minVal + (range * i / yTicks);
    const y = padT + chartH - (i / yTicks) * chartH * 0.85 - chartH * 0.05;
    yAxisHtml += `<text x="${padL - 8}" y="${y + 4}" text-anchor="end" fill="#6b7280" font-size="11">${Math.round(val)}M</text>`;
    yAxisHtml += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#2d3748" stroke-width="0.5" stroke-dasharray="4,4"/>`;
  }

  // X-axis labels (from market value data points)
  let xAxisHtml = '';
  points.forEach(p => {
    xAxisHtml += `<text x="${p.x}" y="${padT + chartH + 18}" text-anchor="middle" fill="#6b7280" font-size="11">${p.year}</text>`;
  });

  // Dots and value labels on data points
  let dotsHtml = '';
  points.forEach((p, i) => {
    dotsHtml += `
      <circle cx="${p.x}" cy="${p.y}" r="14" fill="transparent" class="mv-hover-area" data-idx="${i}"/>
      <circle cx="${p.x}" cy="${p.y}" r="5" fill="${c.dot}" stroke="#0a0e17" stroke-width="2" class="mv-dot" data-idx="${i}"/>
      <text x="${p.x}" y="${p.y - 12}" text-anchor="middle" fill="${c.line}" font-size="10" font-weight="600">${p.value}</text>
    `;
  });

  // Transfer event markers on the chart
  let transferHtml = '';
  if (transfers && transfers.length > 0) {
    transfers.forEach((t, idx) => {
      const tYear = parseInt(t.year);
      if (tYear < minYear || tYear > maxYear) return;

      const tx = yearToX(t.year);

      // Dashed vertical line at transfer year
      transferHtml += `<line x1="${tx}" y1="${padT}" x2="${tx}" y2="${padT + chartH}" stroke="#f87171" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>`;

      // Transfer marker dot on x-axis
      transferHtml += `<circle cx="${tx}" cy="${padT + chartH}" r="4" fill="#f87171" stroke="#0a0e17" stroke-width="1.5"/>`;

      // Transfer label below x-axis (alternating above/below to avoid overlap)
      const isEven = idx % 2 === 0;
      const labelY = padT + chartH + (isEven ? 48 : 62);

      // Arrow icon
      transferHtml += `<text x="${tx}" y="${labelY - 14}" text-anchor="middle" fill="#f87171" font-size="12">🔄</text>`;

      // Club names: from → to (truncate if too long)
      const fromName = t.from.length > 8 ? t.from.substring(0, 7) + '…' : t.from;
      const toName = t.to.length > 8 ? t.to.substring(0, 7) + '…' : t.to;
      const label = `${fromName}→${toName}`;
      transferHtml += `<text x="${tx}" y="${labelY}" text-anchor="middle" fill="#f87171" font-size="9" font-weight="600">${label}</text>`;

      // Fee
      const feeY = labelY + 13;
      const feeText = t.fee.length > 10 ? t.fee.substring(0, 9) + '…' : t.fee;
      transferHtml += `<text x="${tx}" y="${feeY}" text-anchor="middle" fill="#9ca3af" font-size="8">${feeText}</text>`;

      // Club logos if available
      if (t.fromLogo) {
        const logoY = labelY + 24;
        transferHtml += `<image x="${tx - 22}" y="${feeY}" width="14" height="14" href="${t.fromLogo}" preserveAspectRatio="xMidYMid meet"/>`;
        transferHtml += `<image x="${tx + 8}" y="${feeY}" width="14" height="14" href="${t.toLogo}" preserveAspectRatio="xMidYMid meet"/>`;
      }
    });
  }

  return `
    <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;" xmlns:xlink="http://www.w3.org/1999/xlink">
      <defs>
        <linearGradient id="mvGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${c.fill1}"/>
          <stop offset="100%" stop-color="${c.fill2}"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
          <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      ${yAxisHtml}
      ${xAxisHtml}
      <path d="${areaPath}" fill="url(#mvGrad)"/>
      <path d="${linePath}" fill="none" stroke="${c.line}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
      ${dotsHtml}
      ${transferHtml}
    </svg>
  `;
}

  document.getElementById('detail-back-btn').onclick = () => navigateTo('list', p.position);
  document.getElementById('detail-back-btn2').onclick = () => navigateTo('list', p.position);

  // Hero
  const heroEl = document.getElementById('detail-hero');
  heroEl.setAttribute('data-pos', p.position);

  // Avatar
  const avatarHtml = p.photo
    ? `<img src="${p.photo}" alt="${p.name}" onerror="this.style.display='none';this.parentNode.innerHTML='${p.avatarEmoji || '⚽'}'">`
    : (p.avatarEmoji || '⚽');
  document.getElementById('detail-avatar').innerHTML = avatarHtml;

  // Hero club logo
  const heroClubLogoEl = document.getElementById('detail-hero-club-logo');
  if (p.currentClubLogo) {
    heroClubLogoEl.innerHTML = `<img src="${p.currentClubLogo}" alt="${p.currentClub}" onerror="this.style.display='none'">`;
    heroClubLogoEl.style.display = '';
  } else {
    heroClubLogoEl.style.display = 'none';

  // Name
  document.getElementById('detail-name').innerHTML =
    `<span class="flag">${p.flag}</span>${p.name}`;

  // Tags

  }
